name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Lint — run only once, not per OS/Python matrix
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format (check only)
        run: ruff format --check .

      - name: mypy
        run: mypy clang_format_inc/

  # ---------------------------------------------------------------------------
  # Test matrix — Python 3.8-3.12, Ubuntu + Windows
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=clang_format_inc --cov-report=term-missing

      - name: Enforce coverage threshold
        run: pytest --cov=clang_format_inc --cov-fail-under=85
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
